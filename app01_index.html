<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>App01</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 80px auto; text-align: center; }
    input { padding: 8px; font-size: 16px; }
    button { padding: 8px 16px; font-size: 16px; }
    #message { font-size: 24px; margin-top: 20px; }
    #version { font-size: 12px; color: gray; }
  </style>
</head>
<body>
  <h2>App01</h2>
  <form id="form">
    <input id="name" placeholder="Enter your name" autofocus>
    <button type="submit">Go</button>
  </form>
  <p id="message"></p>
  <p id="version">v1.0.1</p>
  <script>
    document.getElementById('form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const res = await fetch('http://localhost:5401/api/greet', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name: name})
      });
      const data = await res.json();
      document.getElementById('message').textContent = data.message;
    });
  </script>
</body>
</html>
